<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Book Details')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-info-circle mr-2" style="color: var(--accent);"></i>Book Profile</h2>
                        <a href="/books" class="btn-custom btn-custom-secondary btn-sm">
                            <i class="fas fa-arrow-left"></i> Back to List
                        </a>
                    </div>
                    
                    <div class="mb-4 text-center">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 80px; height: 80px; background: var(--bg-surface-hover); border: 2px solid var(--accent);">
                            <i class="fas fa-book fa-3x" style="color: var(--accent);"></i>
                        </div>
                        <h3 class="mb-1" th:text="${book.name}"></h3>
                        <p class="text-muted mb-0">ISBN: <span th:text="${book.isbn}"></span></p>
                    </div>

                    <hr style="border-top: 1px solid var(--border);">

                    <div class="row my-4">
                        <div class="col-sm-6 mb-3">
                            <h6 class="text-muted uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;">Authors</h6>
                            <div th:each="author : ${book.authors}">
                                <p class="mb-1 font-weight-bold"><i class="fas fa-user-nib mr-2 text-muted"></i><span th:text="${author.name}"></span></p>
                            </div>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <h6 class="text-muted uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;">Publishers</h6>
                            <div th:each="pub : ${book.publishers}">
                                <p class="mb-1 font-weight-bold"><i class="fas fa-building mr-2 text-muted"></i><span th:text="${pub.name}"></span></p>
                            </div>
                        </div>
                    </div>

                    <div class="row my-4">
                        <div class="col-sm-6 mb-3">
                            <h6 class="text-muted uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;">Categories</h6>
                            <span th:each="cat : ${book.categories}" class="badge-custom badge-available mr-1 mb-1" style="background-color: var(--accent-glow); color: var(--accent); border-color: rgba(99, 102, 241, 0.3);">
                                <span th:text="${cat.name}"></span>
                            </span>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <h6 class="text-muted uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;">Serial Name</h6>
                            <p class="font-weight-bold" th:text="${book.serialName}"></p>
                        </div>
                    </div>

                    <div class="my-4">
                        <h6 class="text-muted uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;">Description</h6>
                        <p class="text-light" style="line-height: 1.6;" th:text="${book.description}"></p>
                    </div>

                    <hr style="border-top: 1px solid var(--border);">

                    <!-- Active Borrowing Status Card -->
                    <div class="my-4 p-3 rounded" style="background-color: var(--bg-surface-hover); border: 1px solid var(--border);">
                        <h6 class="mb-2" style="font-size: 0.9rem; font-weight: 600;"><i class="fas fa-history mr-2"></i>Borrowing Status</h6>
                        
                        <div th:if="${activeIssue == null}">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="badge-custom badge-available"><i class="fas fa-check mr-1"></i>Available for Borrowing</span>
                                </div>
                                <a th:href="@{/issue-book/{id}(id=${book.id})}" class="btn-custom btn-custom-success btn-sm">
                                    <i class="fas fa-hand-holding"></i> Issue Book
                                </a>
                            </div>
                        </div>
                        
                        <div th:if="${activeIssue != null}">
                            <div class="row">
                                <div class="col-sm-6 mb-2">
                                    <p class="mb-1 text-muted text-sm" style="font-size: 0.8rem;">Issued To</p>
                                    <p class="mb-0 font-weight-bold" th:text="${activeIssue.borrowerName}"></p>
                                    <p class="mb-0 text-muted" style="font-size: 0.85rem;" th:text="${activeIssue.borrowerEmail}"></p>
                                </div>
                                <div class="col-sm-6 mb-2">
                                    <p class="mb-1 text-muted text-sm" style="font-size: 0.8rem;">Date Info</p>
                                    <p class="mb-0"><strong>Issued:</strong> <span th:text="${activeIssue.issueDate}"></span></p>
                                    <p class="mb-0"><strong>Due Date:</strong> <span th:text="${activeIssue.dueDate}"></span></p>
                                </div>
                            </div>
                            <div class="mt-3 text-right">
                                <a th:href="@{/return-book/{id}(id=${activeIssue.id})}" class="btn-custom btn-custom-danger btn-sm">
                                    <i class="fas fa-undo"></i> Return Book
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4" style="display: flex; gap: 10px; justify-content: center;">
                        <a th:href="@{/update/{id}(id=${book.id})}" class="btn-custom btn-custom-warning btn-sm" style="background-color: var(--warning); color: black;">
                            <i class="fas fa-edit mr-1"></i> Edit Book
                        </a>
                        <a th:href="@{/remove-book/{id}(id=${book.id})}" class="btn-custom btn-custom-danger btn-sm" onclick="return confirm('Are you sure you want to delete this book?');">
                            <i class="fas fa-trash-alt mr-1"></i> Delete Book
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
