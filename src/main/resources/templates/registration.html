<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('User Registration')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-6">
                <div class="card-custom">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x" style="color: var(--accent);"></i>
                        <h2 class="mt-3">Create Account</h2>
                        <p class="text-muted">Register to access the library portal</p>
                    </div>
                    
                    <form th:action="@{/register}" th:object="${user}" method="post">
                        
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="firstName">First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control form-control-custom" id="firstName" placeholder="First Name" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="lastName">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control form-control-custom" id="lastName" placeholder="Last Name" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-custom" id="email" placeholder="name@domain.com" required>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="font-size: 0.85rem; font-weight: 500;"></div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" th:field="*{password}" class="form-control form-control-custom" id="password" placeholder="Create Password" required>
                        </div>

                        <div class="form-group mt-4">
                            <button type="submit" class="btn-custom btn-custom-primary btn-block">
                                <i class="fas fa-check-circle mr-1"></i>Register
                            </button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <span class="text-muted">Already have an account? </span>
                            <a href="/login" style="color: var(--accent); font-weight: 500;">Login Here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
