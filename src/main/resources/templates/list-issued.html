<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Issued Books')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="card-custom">
            <h2><i class="fas fa-list-ul mr-2"></i>Issued Books Log</h2>
            
            <div th:if="${#lists.isEmpty(issues)}" class="text-center my-5">
                <i class="fas fa-history fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">No books have been issued yet.</h5>
                <a href="/books" class="btn-custom btn-custom-primary mt-3">Browse Books to Issue</a>
            </div>
            
            <div th:if="${!#lists.isEmpty(issues)}" class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>Book Title</th>
                            <th>ISBN</th>
                            <th>Borrower Name</th>
                            <th>Borrower Email</th>
                            <th>Issue Date</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="issue : ${issues}">
                            <td th:text="${issue.book.name}"></td>
                            <td th:text="${issue.book.isbn}"></td>
                            <td th:text="${issue.borrowerName}"></td>
                            <td th:text="${issue.borrowerEmail}"></td>
                            <td th:text="${issue.issueDate}"></td>
                            <td th:text="${issue.dueDate}"></td>
                            <td>
                                <span th:if="${issue.returned}" class="badge-custom badge-available">
                                    <i class="fas fa-check-circle mr-1"></i>Returned
                                </span>
                                <span th:if="${!issue.returned and T(java.time.LocalDate).now().isAfter(issue.dueDate)}" class="badge-custom badge-borrowed">
                                    <i class="fas fa-exclamation-triangle mr-1"></i>Overdue
                                </span>
                                <span th:if="${!issue.returned and !T(java.time.LocalDate).now().isAfter(issue.dueDate)}" class="badge-custom badge-borrowed" style="background-color: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3);">
                                    <i class="fas fa-clock mr-1"></i>Borrowed
                                </span>
                            </td>
                            <td>
                                <a th:if="${!issue.returned}" th:href="@{/return-book/{id}(id=${issue.id})}" class="btn-custom btn-custom-success btn-sm">
                                    <i class="fas fa-undo"></i> Return
                                </a>
                                <span th:if="${issue.returned}" class="text-muted">-</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
