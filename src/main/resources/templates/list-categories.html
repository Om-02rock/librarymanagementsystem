<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Categories List')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="card-custom">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h2><i class="fas fa-tags mr-2"></i>Categories Registry</h2>
                <div class="d-flex gap-2" style="gap: 10px;">
                    <a href="/addCategory" class="btn-custom btn-custom-primary">
                        <i class="fas fa-plus"></i> Add Category
                    </a>
                    <a href="/export/all-category" class="btn-custom btn-custom-secondary">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </a>
                </div>
            </div>

            <div th:switch="${categories}">
                <div th:case="null" class="text-center my-5">
                    <i class="fas fa-info-circle fa-2x text-muted mb-2"></i>
                    <p class="text-muted">No categories registered yet.</p>
                </div>
                
                <div th:case="*">
                    <div class="table-responsive col-md-8 offset-md-2">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>Category Name</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="category : ${categories}">
                                    <td>
                                        <strong th:text="${category.name}"></strong>
                                    </td>
                                    <td>
                                        <div class="d-flex justify-content-center align-items-center" style="gap: 8px;">
                                            <a th:href="@{/updateCategory/{id}(id=${category.id})}" class="btn-custom btn-custom-warning btn-sm" style="background-color: var(--warning); color: black;" title="Edit Category">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <a th:href="@{/remove-category/{id}(id=${category.id})}" class="btn-custom btn-custom-danger btn-sm" title="Delete Category" onclick="return confirm('Are you sure you want to delete this category?');">
                                                <i class="fas fa-trash-alt"></i> Delete
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
