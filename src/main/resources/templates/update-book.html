<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Update Book')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-custom">
                    <h2 class="mb-4"><i class="fas fa-edit mr-2" style="color: var(--warning);"></i>Update Book Information</h2>
                    
                    <form th:action="@{/update-book/{id}(id=${book.id})}" th:object="${book}" method="post">
                        <div class="form-group">
                            <label for="isbn">ISBN</label>
                            <input type="text" th:field="*{isbn}" class="form-control form-control-custom" id="isbn" placeholder="ISBN" required>
                            <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-danger mt-1"></span>
                        </div>

                        <div class="form-group">
                            <label for="name">Book Title</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-custom" id="name" placeholder="Book Title" required>
                        </div>

                        <div class="form-group">
                            <label for="serialName">Serial Name / Number</label>
                            <input type="text" th:field="*{serialName}" class="form-control form-control-custom" id="serialName" placeholder="Serial Name" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea th:field="*{description}" class="form-control form-control-custom" id="description" placeholder="Description" rows="4" required></textarea>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn-custom btn-custom-primary"><i class="fas fa-save mr-1"></i>Save Changes</button>
                            <a href="/books" class="btn-custom btn-custom-secondary"><i class="fas fa-times mr-1"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
