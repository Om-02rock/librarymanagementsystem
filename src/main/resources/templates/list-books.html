<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('All Books')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="card-custom">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h2><i class="fas fa-book mr-2"></i>Library Books Directory</h2>
                <div class="d-flex gap-2" style="gap: 10px;">
                    <a href="/add" class="btn-custom btn-custom-primary">
                        <i class="fas fa-plus"></i> Add Book
                    </a>
                    <a href="/export/all-book" class="btn-custom btn-custom-secondary">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </a>
                </div>
            </div>

            <!-- Search bar -->
            <form th:action="@{/searchBook}" method="get" class="mb-4">
                <div class="input-group">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-custom" placeholder="Search by title, ISBN, or serial number..." aria-label="Search Book">
                    <div class="input-group-append">
                        <button class="btn-custom btn-custom-primary" type="submit" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </form>

            <div th:switch="${books}">
                <div th:case="null" class="text-center my-5">
                    <i class="fas fa-info-circle fa-2x text-muted mb-2"></i>
                    <p class="text-muted">No books found in the registry.</p>
                </div>
                
                <div th:case="*">
                    <div class="table-responsive">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>ISBN</th>
                                    <th>Book Title</th>
                                    <th>Serial</th>
                                    <th>Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book : ${books}">
                                    <td th:text="${book.isbn}"></td>
                                    <td>
                                        <strong th:text="${book.name}"></strong>
                                    </td>
                                    <td th:text="${book.serialName}"></td>
                                    <td>
                                        <span th:if="${#lists.contains(activeIssueBookIds, book.id)}" class="badge-custom badge-borrowed">
                                            <i class="fas fa-user-tag mr-1"></i>Borrowed
                                        </span>
                                        <span th:unless="${#lists.contains(activeIssueBookIds, book.id)}" class="badge-custom badge-available">
                                            <i class="fas fa-check mr-1"></i>Available
                                        </span>
                                    </td>
                                    <td>
                                        <div class="d-flex justify-content-center align-items-center" style="gap: 8px;">
                                            <a th:href="@{/book/{id}(id=${book.id})}" class="btn-custom btn-custom-secondary btn-sm" title="View Details">
                                                <i class="fas fa-eye"></i> Detail
                                            </a>
                                            
                                            <!-- Issue Action -->
                                            <a th:unless="${#lists.contains(activeIssueBookIds, book.id)}" th:href="@{/issue-book/{id}(id=${book.id})}" class="btn-custom btn-custom-success btn-sm" title="Issue Book">
                                                <i class="fas fa-hand-holding"></i> Issue
                                            </a>
                                            
                                            <a th:href="@{/update/{id}(id=${book.id})}" class="btn-custom btn-custom-warning btn-sm" style="background-color: var(--warning); color: black;" title="Edit Book">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/remove-book/{id}(id=${book.id})}" class="btn-custom btn-custom-danger btn-sm" title="Delete Book" onclick="return confirm('Are you sure you want to delete this book?');">
                                                <i class="fas fa-trash-alt"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div th:if="${books.totalPages > 0}" class="d-flex justify-content-center mt-4">
                        <nav aria-label="Page navigation">
                            <ul class="pagination pagination-custom mb-0">
                                <li class="page-item" th:each="pageNumber : ${pageNumbers}" th:classappend="${pageNumber==books.number + 1} ? 'active'">
                                    <a class="page-link" th:href="@{/books(size=${books.size}, page=${pageNumber})}" th:text="${pageNumber}"></a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
