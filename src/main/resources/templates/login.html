<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Admin Login')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="col-md-5">
                <div class="card-custom">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-shield fa-3x" style="color: var(--accent);"></i>
                        <h2 class="mt-3">Admin Login</h2>
                        <p class="text-muted">Enter credentials to manage the library</p>
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        <!-- error message -->
                        <div th:if="${param.error}" class="alert-custom alert-custom-danger">
                            <i class="fas fa-exclamation-circle mr-2"></i>Invalid username or password.
                        </div>

                        <!-- logout message -->
                        <div th:if="${param.logout}" class="alert-custom alert-custom-info">
                            <i class="fas fa-info-circle mr-2"></i>You have been logged out.
                        </div>

                        <!-- success message -->
                        <div th:if="${param.success}" class="alert-custom alert-custom-info" style="background-color: var(--success-glow); color: var(--success); border-color: rgba(16, 185, 129, 0.2);">
                            <i class="fas fa-check-circle mr-2"></i>Registration successful! Please log in.
                        </div>

                        <div class="form-group">
                            <label for="username">Username / Email</label>
                            <input type="text" class="form-control form-control-custom" id="username" name="username" placeholder="Enter Email ID (e.g. admin@library.com)" autofocus="autofocus" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" class="form-control form-control-custom" placeholder="Enter Password" required>
                        </div>

                        <div class="form-group mt-4">
                            <button type="submit" name="login-submit" id="login-submit" class="btn-custom btn-custom-primary btn-block">
                                <i class="fas fa-sign-in-alt mr-1"></i>Log In
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <span class="text-muted">Don't have an account? </span>
                            <a href="/registration" style="color: var(--accent); font-weight: 500;">Register Here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
