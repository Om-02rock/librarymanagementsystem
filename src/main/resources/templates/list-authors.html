<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="comman/header :: head('Authors Registry')"></head>
<body>
    <div th:insert="comman/header :: header"></div>
    
    <div class="container main-content">
        <div class="card-custom">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h2><i class="fas fa-user-nib mr-2"></i>Authors Registry</h2>
                <div class="d-flex gap-2" style="gap: 10px;">
                    <a href="/addAuthor" class="btn-custom btn-custom-primary">
                        <i class="fas fa-plus"></i> Add Author
                    </a>
                    <a href="/export/all-author" class="btn-custom btn-custom-secondary">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </a>
                </div>
            </div>

            <div th:switch="${authors}">
                <div th:case="null" class="text-center my-5">
                    <i class="fas fa-info-circle fa-2x text-muted mb-2"></i>
                    <p class="text-muted">No authors registered yet.</p>
                </div>
                
                <div th:case="*">
                    <div class="table-responsive">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>Author Name</th>
                                    <th>Biography / Description</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="author : ${authors}">
                                    <td>
                                        <strong th:text="${author.name}"></strong>
                                    </td>
                                    <td th:text="${author.description}"></td>
                                    <td>
                                        <div class="d-flex justify-content-center align-items-center" style="gap: 8px;">
                                            <a th:href="@{/updateAuthor/{id}(id=${author.id})}" class="btn-custom btn-custom-warning btn-sm" style="background-color: var(--warning); color: black;" title="Edit Author">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <a th:href="@{/remove-author/{id}(id=${author.id})}" class="btn-custom btn-custom-danger btn-sm" title="Delete Author" onclick="return confirm('Are you sure you want to delete this author?');">
                                                <i class="fas fa-trash-alt"></i> Delete
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div th:if="${authors.totalPages > 0}" class="d-flex justify-content-center mt-4">
                        <nav aria-label="Page navigation">
                            <ul class="pagination pagination-custom mb-0">
                                <li class="page-item" th:each="pageNumber : ${pageNumbers}" th:classappend="${pageNumber==authors.number + 1} ? 'active'">
                                    <a class="page-link" th:href="@{/authors(size=${authors.size}, page=${pageNumber})}" th:text="${pageNumber}"></a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="comman/footer :: footer"></div>
</body>
</html>
